openapi: 3.0.0
info:
  title: Product Service API
  version: 1.0.0

servers:
  - url: https://37yguasxvd.execute-api.eu-west-1.amazonaws.com/dev
    description: Dev environment

paths:
  /products:
    get:
      summary: Get all products
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '500':
          description: Could not load products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProduct'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProduct'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ProductBase:
      type: object
      required:
        - title
        - price
        - description
        - count
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        count:
          type: string
    Product:
      allOf:
        - $ref: '#/components/schemas/ProductBase'
        - type: object
      required:
        - id
      properties:
        id:
          type: string
    CreateProduct:
      $ref: '#/components/schemas/ProductBase'
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string